name:   CI-WORKFLOW
on: 
  push: 
jobs: 
  build: 
    runs-on:  ubuntu-latest
    steps: 
      - name:  Checkout Code
        uses:  actions/checkout@v7

      - name:  Setup NodeJS
        uses:  actions/setup-node@v3
        with: 
          node-version:  22

      - name:  Install Dependencies
        run:  npm install

      - name:  Build Application
        run:  npm run build
